name: Daily Gold Report

on:
  workflow_dispatch:
    inputs:
      asof:
        description: "Report date in YYYY-MM-DD. Leave blank to use Asia/Shanghai today."
        required: false
        type: string
      train:
        description: "Train models before generating report."
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "17 1 * * 1-5"

concurrency:
  group: daily-gold-report
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Shanghai
      PYTHONIOENCODING: utf-8
      MPLBACKEND: Agg
      EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-wqy-zenhei

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Resolve run parameters
        id: params
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.asof }}" ]]; then
            REPORT_DATE="${{ inputs.asof }}"
          else
            REPORT_DATE="$(TZ=Asia/Shanghai date +%F)"
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.train }}" == "false" ]]; then
            TRAIN_FLAG="--no-train"
          else
            TRAIN_FLAG="--train"
          fi

          echo "REPORT_DATE=${REPORT_DATE}" >> "$GITHUB_ENV"
          echo "TRAIN_FLAG=${TRAIN_FLAG}" >> "$GITHUB_ENV"
          echo "report_date=${REPORT_DATE}" >> "$GITHUB_OUTPUT"
          echo "train_flag=${TRAIN_FLAG}" >> "$GITHUB_OUTPUT"

      - name: Run pipeline
        run: python run_pipeline.py --asof "$REPORT_DATE" "$TRAIN_FLAG"

      - name: Send email
        if: env.EMAIL_SENDER != '' && env.EMAIL_PASSWORD != '' && env.EMAIL_RECEIVERS != ''
        run: python scripts/send_report_email.py --report-date "$REPORT_DATE"

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gold-report-${{ steps.params.outputs.report_date }}
          path: |
            reports/daily/${{ steps.params.outputs.report_date }}_gold_report.md
            reports/daily/${{ steps.params.outputs.report_date }}_gold_report.html
            reports/monitoring/monitoring_daily.md
            reports/backtest/backtest_latest.md
          if-no-files-found: error
